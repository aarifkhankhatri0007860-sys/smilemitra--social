<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smile Social</title>

<link rel="stylesheet" href="dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Top Header -->

<header>

<div class="logo">
😊 Smile Social
</div>

<div class="header-icons">

<i class="fas fa-bell"></i>

<i class="fas fa-comment-dots"></i>

</div>

</header>

<!-- Stories -->

<section class="stories">

<div class="story add-story">
+
</div>

<div class="story"></div>
<div class="story"></div>
<div class="story"></div>
<div class="story"></div>
<div class="story"></div>

</section>

<!-- Create Post -->

<section class="create-post">

<input type="text"
placeholder="What's on your mind?">

<div class="post-actions">

<button>
📷 Photo
</button>

<button>
🎥 Video
</button>

</div>

</section>

<!-- Feed -->

<section class="feed">

<div class="post">

<div class="post-header">

<div class="user">

<div class="avatar"></div>

<div>

<h4>Smile User</h4>

<p>2 min ago</p>

</div>

</div>

</div>

<img
src="https://picsum.photos/500/300"
class="post-image">

<div class="post-actions-feed">

<span>❤️ 120</span>

<span>💬 25</span>

<span>↗️ Share</span>

</div>

</div>

</section>

<!-- Bottom Navigation -->

<nav class="bottom-nav">

<div>🏠</div>

<div>🔍</div>

<div>🎬</div>

<div>💬</div>

<div>👤</div>

</nav>

</body>
</html>

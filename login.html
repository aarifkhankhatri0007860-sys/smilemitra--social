<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smile Social Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:350px;
background:#161616;
padding:25px;
border-radius:20px;
box-shadow:0 0 20px rgba(212,175,55,.4);
}

h1{
text-align:center;
color:#D4AF37;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#D4AF37;
font-weight:bold;
cursor:pointer;
}

a{
color:#D4AF37;
text-decoration:none;
}

p{
text-align:center;
color:white;
}
</style>

</head>

<body>

<div class="card">

<h1>Smile Social</h1>

<input
id="loginEmail"
placeholder="Email or Username">

<input
id="loginPassword"
type="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<p>
<a href="signup.html">
Create Account
</a>
</p>

</div>

<script src="auth.js"></script>

</body>
</html>
